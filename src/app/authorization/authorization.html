<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #e6f0fa;">

  <div style="width: 923px; height: 1089px; background: white; box-shadow: 0 4px 12px rgba(255, 255, 255, 0.959); display: flex; flex-direction: column; overflow: hidden; margin-top: 200px; border-radius: 30px;">

    <div style="background: #E2F6FF; padding: 30px 40px; flex-shrink: 0;">
      <h2 style="margin: 0; color: #2c3e50; font-size: 28px; font-weight: 200; text-align: center;">Авторизация</h2>
    </div>

    <form style="padding: 50px 60px; flex: 1; display: flex; flex-direction: column;">

      <div style="margin-bottom: 25px;">
        <label style="display: block; font-size: 18px; font-weight: 500; margin-bottom: 8px; color: #333;">Никнейм/Почта*</label>
        <input 
          type="email" 
          [(ngModel)]="nickname" 
          name="nickname"
          style="width: 100%; padding: 15px 18px; font-size: 16px; border: 1px solid #ccc; border-radius: 12px; box-sizing: border-box; outline: none;"
        >
      </div>

      <div style="margin-bottom: 30px;">
        <label style="display: block; font-size: 18px; font-weight: 500; margin-bottom: 8px; color: #333;">Пароль*</label>
        <input 
          type="password" 
          [(ngModel)]="password" 
          name="password" 
          (input)="onPassword()"
          style="width: 100%; padding: 15px 18px; font-size: 16px; border: 1px solid #ccc; border-radius: 12px; box-sizing: border-box; outline: none;"
        >
        <div *ngIf="!isPasswordValid && password.length > 0" style="color: red; font-size: 14px; margin-top: 5px;">
          Пароль должен быть минимум 6 символов
        </div>
      </div>

      <div style="margin-bottom: 30px;">
        <span style="font-size: 16px; color: #888; font-weight: 400;">*поля обязательные для заполнения</span>
      </div>

      <div style="display: flex; justify-content: center; margin-bottom: 400px;">
        <button 
          type="button" 
          (click)="onLogin()"
          style="background: #E2F6FF; color: #5D98DE; border: 4px solid #8fbdf5; padding: 16px 60px; font-size: 18px; font-weight: 600; cursor: pointer; letter-spacing: 1px; border-radius: 30px;"
        >
          Войти
        </button>
      </div>

      <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
        <span style="font-size: 18px; color: #555;">Ещё нет аккаунта?</span>
        <a routerLink="/registration" style="background: #E2F6FF; color: #5D98DE; border: 4px solid #8fbdf5; padding: 12px 35px; font-size: 18px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; border-radius: 30px;">
          Зарегистрироваться
        </a>
      </div>

    </form>

  </div>
</div>
