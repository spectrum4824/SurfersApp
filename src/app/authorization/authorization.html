<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #D2F1FC; flex-direction: column; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;">

  <div style="width: 700px; height: auto; background: white; box-shadow: 0 0 60px rgba(255, 255, 255, 0.98), 0 0 40px rgba(255, 255, 255, 0.8), 0 8px 30px rgba(0, 0, 0, 0.15); display: flex; flex-direction: column; overflow: hidden; margin-top: 40px; margin-bottom: 40px;">

    <div style="background: #E2F6FF; padding: 20px 40px; flex-shrink: 0;">
      <h2 style="margin: 0; color: #2c3e50; font-size: 26px; font-weight: 300; text-align: center;">Авторизация</h2>
    </div>

    <!-- ОТСТУП ПОСЛЕ ШАПКИ: меняй padding-top в form ниже -->
    <form style="padding: 200px 60px 30px; flex: 1; display: flex; flex-direction: column; align-items: center;" #loginForm="ngForm">

      <!-- Поле Никнейм/Почта -->
      <!-- ДЛИНА ПОЛЯ: меняй max-width чтобы сделать уже/шире -->
      <div style="margin-bottom: 25px; width: 100%; max-width: 400px;">
        <label style="display: block; font-size: 16px; font-weight: 400; margin-bottom: 8px; color: #6C757D;">Никнейм/Почта*</label>
        <div style="position: relative;">
          <input 
            type="text" 
            [(ngModel)]="nickname" 
            name="nickname"
            style="width: 100%; height: 35px; padding: 0 30px 0 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; outline: none;"
            [style.border-color]="getNicknameBorderColor()"
          >
          @if (nickname.length > 0) {
            <span 
              (click)="nickname = ''; onClearField('nickname')"
              style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; color: #999; user-select: none; line-height: 1;"
            >×</span>
          }
        </div>
      </div>

      <!-- Поле Пароль -->
      <div style="margin-bottom: 25px; width: 100%; max-width: 400px;">
        <label style="display: block; font-size: 16px; font-weight: 400; margin-bottom: 8px; color: #6C757D;">Пароль*</label>
        <div style="position: relative;">
          <input 
            type="password" 
            [(ngModel)]="password" 
            name="password"
            style="width: 100%; height: 35px; padding: 0 30px 0 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; outline: none;"
            [style.border-color]="getPasswordBorderColor()"
          >
          @if (password.length > 0) {
            <span 
              (click)="password = ''; onClearField('password')"
              style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; color: #999; user-select: none; line-height: 1;"
            >×</span>
          }
        </div>
        <!-- Ошибка: неверный пароль -->
        @if (showPasswordError) {
          <div style="color: red; font-size: 12px; margin-top: 4px;">
            Пароль неверный
          </div>
        }
      </div>

      <!-- Надпись про обязательные поля -->
      <!-- ОТСТУП ОТ ПАРОЛЯ: меняй margin-top -->
      <div style="margin-bottom: 20px; margin-top: 30px; text-align: center; width: 100%;">
        <span style="font-size: 14px; color: #6C757D; font-weight: 400;">* - поля, обязательные для заполнения</span>
      </div>

      <!-- Ошибка: не все поля заполнены -->
      @if (showEmptyFieldsError) {
        <div style="color: red; font-size: 14px; margin-bottom: 15px; text-align: center;">
          Заполнены не все обязательные поля!
        </div>
      }

      <!-- Кнопка Войти -->
      <button 
        type="button" 
        (click)="onLogin()"
        style="background: #E2F6FF; color: #5D98DE; border: 4px solid #B0D4F3; padding: 16px 80px; font-size: 20px; font-weight: 600; cursor: pointer; letter-spacing: 1px; border-radius: 0; white-space: nowrap;"
      >
        Войти
      </button>

      <!-- Кнопка Зарегистрироваться -->
      <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 200px; margin-bottom: 30px;">
        <span style="font-size: 16px; color: #6C757D;">Ещё нет аккаунта?</span>
        <a routerLink="/registration" style="background: #E2F6FF; color: #5D98DE; border: 4px solid #B0D4F3; padding: 12px 35px; font-size: 17px; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-block; border-radius: 0;">
          Зарегистрироваться
        </a>
      </div>
    </form>
  </div>
</div>
