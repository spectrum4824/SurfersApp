<div style="background: #D4EBF8; min-height: 100vh; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;">

  <div style="max-width: 900px; margin: 0 auto; padding: 20px;">

    @if (isLoggedIn) {
      <div style="background: white; margin-bottom: 20px;">
        <div style="background: #C5E7F5; padding: 10px 15px;">
          <span style="color: #333; font-size: 14px;">Добавление новой записи</span>
        </div>
        <div style="padding: 15px 20px;">
          <div style="margin-bottom: 15px;">
            <label style="display: block; color: #888; font-size: 14px; margin-bottom: 5px;">Введите текст</label>
            <textarea [(ngModel)]="newPostText" name="newPostText" maxlength="4095" placeholder="Текст"
              style="width: 100%; height: 150px; padding: 10px; font-size: 14px; border: 1px solid #E0E0E0; box-sizing: border-box; outline: none; resize: vertical; font-family: inherit;"></textarea>
          </div>
          <div style="margin-bottom: 15px;">
            <label style="display: block; color: #888; font-size: 14px; margin-bottom: 5px;">Прикрепить изображение</label>
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div style="display: flex; align-items: center;">
                <input type="text" 
                  [(ngModel)]="newPostImagePath" 
                  name="newPostImageUrl"
                  placeholder="URL картинки или assets/..."
                  style="width: 200px; height: 35px; padding: 0 10px; font-size: 14px; border: 1px solid #ccc; border-right: none; box-sizing: border-box; outline: none; background: white; cursor: text;">
                <button type="button" (click)="triggerPostFileInput()"
                  style="height: 35px; padding: 0 20px; font-size: 14px; cursor: pointer; background: #E2F6FF; color: #5D98DE; border: 1px solid #ccc; white-space: nowrap;">Обзор...</button>
                <input type="file" #postFileInput (change)="onPostFileSelected($event)" accept="image/*" style="display: none;">
              </div>
              <button type="button" (click)="addPost()" [disabled]="!canAddPost"
                [style.opacity]="canAddPost ? '1' : '0.5'" [style.cursor]="canAddPost ? 'pointer' : 'not-allowed'"
                style="background: #E2F6FF; color: #5D98DE; border: 4px solid #B0D4F3; padding: 0 50px; height: 35px; font-size: 17px; font-weight: 600; cursor: pointer; border-radius: 0; white-space: nowrap;">
                Добавить
              </button>
            </div>
            @if (newPostImagePreview) {
              <div style="margin-top: 10px;">
                <img [src]="newPostImagePreview" style="max-width: 200px; max-height: 200px; object-fit: cover;">
                <small style="display: block; color: #888; margin-top: 5px;">Предпросмотр выбранного файла</small>
              </div>
            }
          </div>
        </div>
      </div>
    }

    @for (post of posts; track post.id) {
      <div style="background: white; margin-bottom: 20px;">
        <div style="background: #C5E7F5; padding: 10px 15px; display: flex; align-items: center;">
          <img [src]="post.avatar" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px;">
          <div>
            <div style="color: #000; font-weight: bold; font-size: 14px;">{{ post.author }}</div>
            <div style="color: #888; font-size: 12px;">{{ post.date }}</div>
          </div>
        </div>
        
        @if (post.text) {
          <div style="padding: 15px; color: #000; font-size: 14px; line-height: 1.5;">{{ post.text }}</div>
        }
        
        @if (post.image) {
            <img [src]="post.image" 
                
                style="width: 100%; max-height: 400px; display: block; object-fit: cover;">
        }
        
        <div style="background: #C5E7F5; padding: 5px 15px; display: flex; justify-content: flex-end; align-items: center;">
          <span style="color: #E8A0B4; margin-right: 5px; font-size: 14px;">{{ post.likes }}</span>
          <i [class]="post.isLiked ? 'bi bi-heart-fill' : 'bi bi-heart'" (click)="toggleLike(post)"
            style="color: #E8A0B4; cursor: pointer; font-size: 18px;"></i>
        </div>
      </div>
    }
    @empty {
      <div style="text-align: center; color: #888; padding: 40px;">Пока нет ни одной записи</div>
    }

  </div>
</div>
